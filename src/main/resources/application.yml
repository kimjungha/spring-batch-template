spring:
  application:
    name: spring-batch-example
  datasource:
    url: jdbc:mysql://localhost:3307/spring_batch?useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  batch:
    jdbc:
      platform: mysql
    job:
      name: ${job.name:None}
      enabled: true
  jpa:
    generate-ddl: true
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    root: info
    org.hibernate.orm.jdbc.bind: trace
